<section class="page__comments">
  <p>You can use your <a href="https://joinmastodon.org">Mastodon</a> or other ActivityPub account to comment on this post by replying to the associated <a class="link" href="about:blank" id="APLinkAnchor">post</a>.</p>
  <p><div class="tooltip"><button onclick="copyAPLink()" onmouseout="outFunc()"><span class="tooltiptext" id="APLinkButton">Copy to clipboard</span>Copy link</button></div><input type="text" value="https://{{ page.comments.host }}/@{{ page.comments.username }}/{{ page.comments.id }}" id="APLinkText"> and search for it on your ActivityPub/Mastodon instance to reply!</p>
  <p id="mastodon-comments-list">
    <button id="load-comment" class="btn btn--twitter">Load comments from Mastodon</button>
  </p>
  <noscript>You have to allow JavaScript to view the comments.</p></noscript>
  <!--<script src="/assets/js/purify.min.js"></script>-->
  <script type="text/javascript">
    function copyAPLink() {
      var copyText = document.getElementById("APLinkText");
      copyText.select();
      copyText.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(copyText.value);
      var tooltip = document.getElementById("APLinkButton");
      tooltip.innerHTML = "Copied: " + copyText.value;
    }
    function outFunc() {
      var tooltip = document.getElementById("APLinkButton");
      tooltip.innerHTML = "Copy to clipboard";
    }
    function escapeHtml(unsafe) {
      return unsafe
           .replace(/&/g, "&amp;")
           .replace(/</g, "&lt;")
           .replace(/>/g, "&gt;")
           .replace(/"/g, "&quot;")
           .replace(/'/g, "&#039;");
    }

    const pageKey = "{{ page.comments.key }}";
    console.debug("Page comments key: " + pageKey);

    if(pageKey?.trim().length > 0) {

      fetch('/api/comments/' + pageKey)
        .then(function(response) {
          return response.json();
        })
        .then(function(metadata) {
          console.debug("Post comments metadata:", metadata);
          if(metadata.success) {
            document.getElementById("load-comment").addEventListener("click", function() {
              document.getElementById("load-comment").innerHTML = "Loading";
              fetch(metadata.data.host + '/api/v1/statuses/' + metadata.data.postId + '/context')
                .then(function(response) {
                  return response.json();
                })
                .then(function(data) {
                  if(data['descendants'] &&
                    Array.isArray(data['descendants']) &&
                    data['descendants'].length > 0) {
                      document.getElementById('mastodon-comments-list').innerHTML = "";
                      data['descendants'].forEach(function(reply) {
                        if(reply.account.display_name.length > 0)
                        {
                          reply.account.display_name = escapeHtml(reply.account.display_name);
                          reply.account.emojis.forEach(emoji => {
                            reply.account.display_name = reply.account.display_name.replace(`:${emoji.shortcode}:`,
                            `<img src="${escapeHtml(emoji.static_url)}" alt="Emoji ${emoji.shortcode}" height="20" width="20" />`);
                            });
                        } else {
                          reply.account.display_name = reply.account.acct;
                        };
                        mastodonComment =
                          `<article id="comment-${reply.id }" class="js-comment comment" itemprop="comment" itemscope itemtype="http://schema.org/Comment">
                            <div class="js-comment comment">
                              <div class="comment__avatar-wrapper">
                                <img class="comment__avatar" src="${escapeHtml(reply.account.avatar_static)}" height=60 width=60 alt="">
                              </div>
                              <div class="comment__content-wrapper">
                                <h3 class="comment__author" itemprop="author" itemscope itemtype="http://schema.org/Person">
                                  <a rel="external nofollow" itemprop="url" href="${reply.account.url}" rel="nofollow">
                                    <span>${reply.account.display_name}</span>
                                  </a>
                                </h3>
                                <p class="comment__date">
                                  <a itemprop= "url" href="${reply.uri}" rel="nofollow">${reply.created_at.substr(0, 10)}</a>
                                </p>
                                <div itemprop="text">${reply.content}</div>
                                <div class="status">
                                  <i class="fa fa-reply fa-fw"></i>${reply.replies_count}&nbsp;|&nbsp;
                                  <i class="fa fa-retweet fa-fw"></i>${reply.reblogs_count}&nbsp;|&nbsp;
                                  <i class="fa fa-star fa-fw"></i>${reply.favourites_count}
                                </div>
                              </div>
                              </div>
                            </article>`;
                        document.getElementById('mastodon-comments-list').appendChild(DOMPurify.sanitize(mastodonComment, {'RETURN_DOM_FRAGMENT': true}));
                      });
                  } else {
                    document.getElementById('mastodon-comments-list').innerHTML = "<p>No comments found (yet! be the first!)</p>";
                  }
                });
              });
          } else {
            document.getElementById('mastodon-comments-list').innerHTML = "<p>Unable to load required comment data for this page.</p>";
          }
        })
        .catch(function(error) {
          document.getElementById('mastodon-comments-list').innerHTML = "<p>Unable to load required comment data for this page.</p>";
          console.error(error);
        });

    } else {
      document.getElementById('mastodon-comments-list').innerHTML = "<p>Unable to load required comment data for this page.</p>";
    }

  </script>
</section>
